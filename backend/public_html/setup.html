<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeadHunter Pro — Ersteinrichtung</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="/shared/style.css">
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .setup-box { width:420px; background:var(--bg2); border:1px solid var(--border2); border-radius:var(--radius-lg); padding:36px; position:relative; z-index:1; }
  .setup-title { font-size:20px; font-weight:700; margin-bottom:6px; }
  .setup-sub { font-size:13px; color:var(--text2); margin-bottom:24px; line-height:1.6; }
  .setup-btn { width:100%; padding:12px; }
  .msg { font-size:12px; margin-top:10px; text-align:center; min-height:18px; }
</style>
</head>
<body>
<div class="grid-bg"></div><div class="glow"></div>
<div class="setup-box">
  <div class="setup-title">🚀 Ersteinrichtung</div>
  <div class="setup-sub">Erstelle deinen Admin-Account für LeadHunter Pro. Dieser Schritt ist nur einmalig möglich.</div>

  <div class="form-group"><label>Vollständiger Name</label><input type="text" id="full_name" class="form-control" placeholder="Max Mustermann"></div>
  <div class="form-group"><label>Benutzername</label><input type="text" id="username" class="form-control" placeholder="admin"></div>
  <div class="form-group"><label>E-Mail</label><input type="email" id="email" class="form-control" placeholder="info@novaflowservices.de"></div>
  <div class="form-group"><label>Passwort</label><input type="password" id="password" class="form-control" placeholder="Mindestens 8 Zeichen"></div>

  <div class="msg" id="msg"></div>
  <button class="btn btn-primary setup-btn" onclick="doSetup()"><i class="fas fa-check"></i> Admin-Account erstellen</button>
</div>

<script src="/shared/api.js"></script>
<script>
async function doSetup() {
  const full_name = document.getElementById('full_name').value.trim();
  const username  = document.getElementById('username').value.trim();
  const email     = document.getElementById('email').value.trim();
  const password  = document.getElementById('password').value;
  const msg       = document.getElementById('msg');

  if (!full_name || !username || !email || !password)
    return (msg.innerHTML = '<span style="color:var(--red)">Bitte alle Felder ausfüllen.</span>');
  if (password.length < 8)
    return (msg.innerHTML = '<span style="color:var(--red)">Passwort mindestens 8 Zeichen.</span>');

  try {
    await api('POST', '/auth/setup', { full_name, username, email, password });
    msg.innerHTML = '<span style="color:var(--green)">✓ Account erstellt — du wirst weitergeleitet...</span>';
    setTimeout(() => window.location.href = '/login.html', 1500);
  } catch (e) {
    msg.innerHTML = `<span style="color:var(--red)">${escHtml(e.message)}</span>`;
  }
}
</script>
</body>
</html>
